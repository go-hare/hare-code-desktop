name: Release hare Desktop

on:
  push:
    tags:
      - "v*"

jobs:
  build-desktop:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            build_script: electron:build:release:win
          - os: macos-14
            label: macos
            build_script: electron:build:release:mac
          - os: ubuntu-latest
            label: linux
            build_script: electron:build:release:linux

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop release
        run: bun run ${{ matrix.build_script }}

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: release/**
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-desktop
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release

      - name: Create checksums
        run: |
          set -euo pipefail
          cd release
          sha256sum * > hare-desktop-checksums.txt
          cat hare-desktop-checksums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
